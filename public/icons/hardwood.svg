<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hw-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0A060"/>
      <stop offset="50%" stop-color="#C47C38"/>
      <stop offset="100%" stop-color="#A86020"/>
    </linearGradient>
    <linearGradient id="hw-left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8C5620"/>
      <stop offset="100%" stop-color="#5A3410"/>
    </linearGradient>
    <linearGradient id="hw-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6C4018"/>
      <stop offset="100%" stop-color="#3C2008"/>
    </linearGradient>
    <linearGradient id="hw-sheen" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,230,170,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,200,120,0)"/>
    </linearGradient>
    <filter id="hw-shdw" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <clipPath id="hw-top-c">
      <polygon points="100,25 182,65 100,105 18,65"/>
    </clipPath>
  </defs>

  <g filter="url(#hw-shdw)">
    <!-- Left face -->
    <polygon points="18,65 100,105 100,165 18,125" fill="url(#hw-left)"/>
    <!-- Right face -->
    <polygon points="100,105 182,65 182,125 100,165" fill="url(#hw-right)"/>
    <!-- Top face base -->
    <polygon points="100,25 182,65 100,105 18,65" fill="url(#hw-top)"/>
    <!-- Top face sheen -->
    <polygon points="100,25 182,65 100,105 18,65" fill="url(#hw-sheen)"/>
  </g>

  <!-- Grain lines — clipped to top face -->
  <g clip-path="url(#hw-top-c)" stroke="#7A4820" stroke-linecap="round">
    <line x1="30" y1="59" x2="112" y2="99" stroke-width="1.2" opacity="0.28"/>
    <line x1="47" y1="51" x2="129" y2="91" stroke-width="1.4" opacity="0.32"/>
    <line x1="63" y1="43" x2="145" y2="83" stroke-width="1.2" opacity="0.28"/>
    <line x1="80" y1="35" x2="162" y2="75" stroke-width="1.4" opacity="0.32"/>
    <!-- Subtle wider grain band -->
    <line x1="55" y1="47" x2="137" y2="87" stroke-width="3" opacity="0.1"/>
    <line x1="72" y1="39" x2="154" y2="79" stroke-width="3" opacity="0.1"/>
  </g>

  <!-- Plank dividers — top face -->
  <g clip-path="url(#hw-top-c)" stroke="#7A4820" stroke-linecap="round">
    <line x1="45" y1="52" x2="155" y2="52" stroke-width="1.8" opacity="0.6"/>
    <line x1="45" y1="78" x2="155" y2="78" stroke-width="1.8" opacity="0.6"/>
  </g>

  <!-- Plank dividers — left face -->
  <line x1="18" y1="85" x2="100" y2="125" stroke="#3C2008" stroke-width="1.2" opacity="0.5"/>
  <line x1="18" y1="105" x2="100" y2="145" stroke="#3C2008" stroke-width="1.2" opacity="0.5"/>

  <!-- Plank dividers — right face -->
  <line x1="100" y1="125" x2="182" y2="85" stroke="#2A1606" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="145" x2="182" y2="105" stroke="#2A1606" stroke-width="1.2" opacity="0.5"/>

  <!-- Edge ridge highlight -->
  <polyline points="18,65 100,25 182,65" fill="none" stroke="rgba(255,228,160,0.55)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
