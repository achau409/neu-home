<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vl-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8C0D4"/>
      <stop offset="55%" stop-color="#7898B4"/>
      <stop offset="100%" stop-color="#567898"/>
    </linearGradient>
    <linearGradient id="vl-left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#486480"/>
      <stop offset="100%" stop-color="#2C4860"/>
    </linearGradient>
    <linearGradient id="vl-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#344E62"/>
      <stop offset="100%" stop-color="#1C3048"/>
    </linearGradient>
    <!-- Gloss streak across top face -->
    <linearGradient id="vl-gloss" x1="0%" y1="0%" x2="55%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.42)"/>
      <stop offset="35%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="vl-shdw" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <clipPath id="vl-top-c">
      <polygon points="100,25 182,65 100,105 18,65"/>
    </clipPath>
  </defs>

  <g filter="url(#vl-shdw)">
    <!-- Left face -->
    <polygon points="18,65 100,105 100,165 18,125" fill="url(#vl-left)"/>
    <!-- Right face -->
    <polygon points="100,105 182,65 182,125 100,165" fill="url(#vl-right)"/>
    <!-- Top face base -->
    <polygon points="100,25 182,65 100,105 18,65" fill="url(#vl-top)"/>
    <!-- Gloss overlay -->
    <polygon points="100,25 182,65 100,105 18,65" fill="url(#vl-gloss)"/>
  </g>

  <!-- Plank dividers — top face -->
  <g clip-path="url(#vl-top-c)" stroke="#3A5870" stroke-linecap="round">
    <line x1="45" y1="52" x2="155" y2="52" stroke-width="1.8" opacity="0.5"/>
    <line x1="45" y1="78" x2="155" y2="78" stroke-width="1.8" opacity="0.5"/>
  </g>

  <!-- Subtle surface micro-scratch lines (vinyl texture) -->
  <g clip-path="url(#vl-top-c)" stroke="#4A6880" stroke-linecap="round">
    <line x1="40" y1="60" x2="110" y2="96" stroke-width="0.7" opacity="0.2"/>
    <line x1="70" y1="44" x2="148" y2="84" stroke-width="0.7" opacity="0.18"/>
    <line x1="90" y1="36" x2="166" y2="72" stroke-width="0.7" opacity="0.2"/>
  </g>

  <!-- Plank dividers — left face -->
  <line x1="18" y1="85" x2="100" y2="125" stroke="#1C3048" stroke-width="1.2" opacity="0.48"/>
  <line x1="18" y1="105" x2="100" y2="145" stroke="#1C3048" stroke-width="1.2" opacity="0.48"/>

  <!-- Plank dividers — right face -->
  <line x1="100" y1="125" x2="182" y2="85" stroke="#142438" stroke-width="1.2" opacity="0.48"/>
  <line x1="100" y1="145" x2="182" y2="105" stroke="#142438" stroke-width="1.2" opacity="0.48"/>

  <!-- Edge ridge highlight (ice-blue) -->
  <polyline points="18,65 100,25 182,65" fill="none" stroke="rgba(200,230,255,0.65)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
