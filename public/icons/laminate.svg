<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lm-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0BFA0"/>
      <stop offset="50%" stop-color="#B8A07C"/>
      <stop offset="100%" stop-color="#9E8860"/>
    </linearGradient>
    <linearGradient id="lm-left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#806850"/>
      <stop offset="100%" stop-color="#5A4830"/>
    </linearGradient>
    <linearGradient id="lm-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#604838"/>
      <stop offset="100%" stop-color="#3E2E1C"/>
    </linearGradient>
    <!-- Subtle sheen — laminate is more reflective than hardwood -->
    <linearGradient id="lm-sheen" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,248,235,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,248,235,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,248,235,0)"/>
    </linearGradient>
    <filter id="lm-shdw" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <clipPath id="lm-top-c">
      <polygon points="100,25 182,65 100,105 18,65"/>
    </clipPath>
  </defs>

  <g filter="url(#lm-shdw)">
    <!-- Left face -->
    <polygon points="18,65 100,105 100,165 18,125" fill="url(#lm-left)"/>
    <!-- Right face -->
    <polygon points="100,105 182,65 182,125 100,165" fill="url(#lm-right)"/>
    <!-- Top face base -->
    <polygon points="100,25 182,65 100,105 18,65" fill="url(#lm-top)"/>
    <!-- Sheen overlay -->
    <polygon points="100,25 182,65 100,105 18,65" fill="url(#lm-sheen)"/>
  </g>

  <!-- Uniform grain lines (lighter, more regular than hardwood) -->
  <g clip-path="url(#lm-top-c)" stroke="#7A6040" stroke-linecap="round">
    <line x1="30" y1="59" x2="112" y2="99" stroke-width="1" opacity="0.18"/>
    <line x1="47" y1="51" x2="129" y2="91" stroke-width="1" opacity="0.2"/>
    <line x1="63" y1="43" x2="145" y2="83" stroke-width="1" opacity="0.18"/>
    <line x1="80" y1="35" x2="162" y2="75" stroke-width="1" opacity="0.2"/>
    <!-- Second set offset — uniform repeat pattern -->
    <line x1="38" y1="55" x2="120" y2="95" stroke-width="0.7" opacity="0.12"/>
    <line x1="55" y1="47" x2="137" y2="87" stroke-width="0.7" opacity="0.12"/>
    <line x1="71" y1="39" x2="153" y2="79" stroke-width="0.7" opacity="0.12"/>
    <line x1="88" y1="31" x2="163" y2="69" stroke-width="0.7" opacity="0.12"/>
  </g>

  <!-- Plank dividers — top face -->
  <g clip-path="url(#lm-top-c)" stroke="#7A6040" stroke-linecap="round">
    <line x1="45" y1="52" x2="155" y2="52" stroke-width="1.8" opacity="0.52"/>
    <line x1="45" y1="78" x2="155" y2="78" stroke-width="1.8" opacity="0.52"/>
  </g>

  <!-- Plank dividers — left face -->
  <line x1="18" y1="85" x2="100" y2="125" stroke="#2E1E0E" stroke-width="1.2" opacity="0.42"/>
  <line x1="18" y1="105" x2="100" y2="145" stroke="#2E1E0E" stroke-width="1.2" opacity="0.42"/>

  <!-- Plank dividers — right face -->
  <line x1="100" y1="125" x2="182" y2="85" stroke="#241408" stroke-width="1.2" opacity="0.42"/>
  <line x1="100" y1="145" x2="182" y2="105" stroke="#241408" stroke-width="1.2" opacity="0.42"/>

  <!-- Edge highlight (warm greige) -->
  <polyline points="18,65 100,25 182,65" fill="none" stroke="rgba(248,235,210,0.55)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
