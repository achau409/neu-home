<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cp-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DDD0B0"/>
      <stop offset="100%" stop-color="#C0AA84"/>
    </linearGradient>
    <linearGradient id="cp-left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A89060"/>
      <stop offset="100%" stop-color="#7A6840"/>
    </linearGradient>
    <linearGradient id="cp-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#807048"/>
      <stop offset="100%" stop-color="#5A4C30"/>
    </linearGradient>
    <!-- Pile texture pattern -->
    <pattern id="cp-pile" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1.6" fill="#A08860" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.1" fill="#B09870" opacity="0.3"/>
      <circle cx="10" cy="0" r="1.1" fill="#B09870" opacity="0.3"/>
      <circle cx="0" cy="10" r="1.1" fill="#B09870" opacity="0.3"/>
      <circle cx="10" cy="10" r="1.1" fill="#B09870" opacity="0.3"/>
    </pattern>
    <!-- Fuzz highlight at top edge -->
    <linearGradient id="cp-edge" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,248,230,0)"/>
      <stop offset="100%" stop-color="rgba(255,248,230,0.3)"/>
    </linearGradient>
    <filter id="cp-shdw" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <clipPath id="cp-top-c">
      <polygon points="100,25 182,65 100,105 18,65"/>
    </clipPath>
    <clipPath id="cp-left-c">
      <polygon points="18,65 100,105 100,165 18,125"/>
    </clipPath>
  </defs>

  <g filter="url(#cp-shdw)">
    <!-- Left face -->
    <polygon points="18,65 100,105 100,165 18,125" fill="url(#cp-left)"/>
    <!-- Left face subtle pile on edge -->
    <polygon points="18,65 100,105 100,165 18,125" fill="url(#cp-edge)" clip-path="url(#cp-left-c)"/>
    <!-- Right face -->
    <polygon points="100,105 182,65 182,125 100,165" fill="url(#cp-right)"/>
    <!-- Top face base -->
    <polygon points="100,25 182,65 100,105 18,65" fill="url(#cp-top)"/>
    <!-- Pile texture overlay -->
    <polygon points="100,25 182,65 100,105 18,65" fill="url(#cp-pile)" clip-path="url(#cp-top-c)"/>
  </g>

  <!-- Top edge soft "raised pile" highlight — slightly thick -->
  <polyline points="18,65 100,25 182,65" fill="none" stroke="rgba(255,245,220,0.6)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Second softer layer -->
  <polyline points="18,65 100,25 182,65" fill="none" stroke="rgba(255,245,220,0.25)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
